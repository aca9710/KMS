version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: kms_user
      POSTGRES_PASSWORD: kms_password
      POSTGRES_DB: kms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kms_user"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
